apiVersion: apps/v1
kind: Deployment
metadata:
  name: testgenie
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: testgenie
  template:
    metadata:
      labels:
        app: testgenie
    spec:
      containers:
        - name: testgenie
          image: saurabhsurve04/testgenie:1.0
          ports:
            - containerPort: 8080